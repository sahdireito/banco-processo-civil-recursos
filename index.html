<script>
const QUESTOES = [
  {num:1, exame:"XVIII Exame — 2015", titulo:"Ação Rescisória — Prazo Decadencial e Efeito Não Suspensivo", enunciado:"Márcia trafegava regularmente quando seu carro foi abalroado pelo veículo de Tânia que, ao atender o celular, perdeu a direção e causou o acidente. Márcia ajuizou ação de reparação de danos materiais, morais e lucros cessantes. O magistrado julgou procedentes os pedidos de danos materiais e morais, rejeitando o de lucros cessantes por inexistência de provas. A sentença transitou em julgado em 19/10/2012.", comando:"Sobre os fatos descritos, assinale a afirmativa correta.", gabarito:"D", alt:{"A": "Márcia poderá propor uma nova demanda com o objetivo de obter os lucros cessantes, desde que apresente, nesse novo processo, as provas da ocorrência desse dano.", "B": "Se Tânia quiser se valer de uma ação rescisória, terá somente até o dia 19/10/2013 para fazê-lo, sob pena de decadência.", "C": "Admitindo-se a hipótese de que Tânia descobrisse que o juiz é irmão de Márcia, ela poderia se valer de uma ação anulatória para fazer cessar os efeitos da sentença, haja vista a falta de imparcialidade do julgador.", "D": "Eventual ação rescisória proposta por Tânia não impede a execução da decisão da sentença por parte de Márcia, ainda que Tânia demonstre que a sentença foi injusta."}, fb:{"A": "Incorreta. O pedido de lucros cessantes foi julgado improcedente com trânsito em julgado — formou-se coisa julgada material. Márcia não pode repropor nova ação com o mesmo pedido, ainda que agora tenha novas provas. Seria ofensa à coisa julgada.", "B": "Incorreta. O prazo decadencial da ação rescisória é de 2 ANOS (não 1 ano), contados do trânsito em julgado da última decisão proferida no processo. Se o trânsito ocorreu em 19/10/2012, o prazo terminaria em 19/10/2014.", "C": "Incorreta. Para desconstituir sentença de mérito transitada em julgado, o instrumento adequado é a ação rescisória — não a ação anulatória. A parcialidade do juiz (art. 966, II, CPC/2015 — dolo ou coação do juiz) pode fundamentar rescisória, não anulatória.", "D": "Correta! Art. 969, CPC/2015 (e regra do CPC/1973): a propositura da ação rescisória NÃO suspende automaticamente a execução da sentença rescindenda. Mesmo que Tânia demonstre que a sentença é injusta ou que há fundamento rescindente, Márcia pode continuar executando normalmente, salvo se Tânia obtiver medida específica de suspensão."}, fund:"Art. 969, CPC/2015: a propositura da ação rescisória não impede o cumprimento da decisão rescindenda. Art. 975, CPC/2015: prazo decadencial de 2 anos, contados do trânsito em julgado da última decisão proferida no processo.", caqui:"Três armadilhas numa só questão: (1) Lucros cessantes com coisa julgada = não pode repropor nova ação. (2) Prazo da rescisória = 2 ANOS (não 1), decadencial. (3) Rescisória NÃO suspende automaticamente a execução — Márcia pode continuar executando enquanto Tânia tenta rescindir. A rescisória desfaz, mas não paralisa sozinha."},
  {num:2, exame:"XVII Exame — 2015", titulo:"Ação Rescisória — Violação de Norma Jurídica e Coisa Julgada", enunciado:"Luan, servidor público estadual, ajuizou ação contra a Fazenda Pública requerendo devolução de descontos indevidos em seu contracheque. O TJMG havia, em ação anterior de Thales, reconhecido a inconstitucionalidade da lei estadual que previa esse desconto. O magistrado acolheu a tese da ré e julgou improcedente o pedido de Luan, tendo a decisão transitado em julgado em 01/04/2012.", comando:"Sobre os fatos descritos, assinale a afirmativa correta.", gabarito:"D", alt:{"A": "Luan poderá se valer de ação anulatória, tendo em vista a manifesta injustiça da sentença.", "B": "Se a inconstitucionalidade da lei estadual tivesse sido reconhecida, na ação proposta por Thales, pelo Supremo Tribunal Federal, Luan poderia ignorar a coisa julgada que lhe foi desfavorável.", "C": "Luan poderá se valer de uma reclamação constitucional, tendo em vista o desrespeito, pela sentença, de posição jurisprudencial firmada pelo TJMG.", "D": "Luan poderia se valer de uma ação rescisória, desde que, para tanto, demonstrasse que houve violação à lei, sendo-lhe vedado, nessa demanda, a rediscussão de matérias fáticas."}, fb:{"A": "Incorreta. Manifesta injustiça da sentença, por si só, não autoriza ação anulatória. Para desconstituir sentença de mérito transitada em julgado, o instrumento adequado é a ação rescisória (art. 966, CPC/2015), com fundamento específico.", "B": "Incorreta. Mesmo que o STF tivesse declarado a inconstitucionalidade em outro processo, Luan não pode simplesmente ignorar a coisa julgada que lhe foi desfavorável. A coisa julgada precisa ser desconstituída pelos meios próprios (ação rescisória).", "C": "Incorreta. Reclamação constitucional tem hipóteses específicas de cabimento (preservar competência dos tribunais, garantir autoridade de suas decisões, respeitar súmula vinculante, respeitar acórdão em controle concentrado). Não cabe reclamação apenas porque a sentença contrariou jurisprudência do TJMG em caso individual.", "D": "Correta! A ação rescisória é o caminho adequado para tentar desconstituir decisão de mérito transitada em julgado. Uma das hipóteses é a violação manifesta de norma jurídica (art. 966, V, CPC/2015). Contudo, a rescisória não é recurso amplo — ela não serve para simples rediscussão de fatos ou de todo o mérito da causa."}, fund:"Art. 966, V, CPC/2015: cabe ação rescisória quando a decisão viola manifestamente norma jurídica. A rescisória é ação autônoma de impugnação, não recurso, e não abre nova fase cognitiva ampla sobre fatos.", caqui:"Regra básica: sentença de mérito com trânsito em julgado = coisa julgada material. Para desconstituir, precisa de ação rescisória com hipótese legal. Não adianta: injustiça da sentença (não basta), precedente de outro processo (não afasta sua coisa julgada), reclamação (hipóteses taxativas). A rescisória é o caminho — mas ela tem hipóteses fechadas, prazo curto (2 anos) e não serve de recurso tardio para reabrir toda a discussão fática."},
  {num:3, exame:"XVII Exame — 2015", titulo:"Error in Procedendo — Extinção por Abandono sem Intimação Pessoal", enunciado:"O Banco Financeiro S.A. ajuizou ação de busca e apreensão de veículo. A primeira tentativa de citação foi infrutífera. O Juízo determinou indicação de novo endereço, publicado na imprensa oficial. O advogado do autor manteve-se inerte por mais de 30 dias, e o processo foi julgado extinto por abandono. Sabendo da impossibilidade de extinção por abandono sem a prévia intimação pessoal da parte, o advogado do autor interpôs apelação.", comando:"Assinale a opção que contém a correta natureza do vício apontado e o pedido adequado à pretensão recursal.", gabarito:"A", alt:{"A": "Por se tratar de error in procedendo e a causa não estar madura para julgamento, o pedido recursal deve ser de anulação da sentença.", "B": "Trata-se de erro material, que justifica o pedido de integração da sentença pelo Tribunal.", "C": "Em se tratando de error in judicando, o pedido adequado, no caso sob exame, é de reforma da sentença.", "D": "Trata-se de erro de procedimento, que justifica o pedido de julgamento do mérito da lide no estado em que se encontra."}, fb:{"A": "Correta! O juiz extinguiu o processo por abandono sem observar a exigência legal de prévia intimação pessoal da parte (art. 485, §1º, CPC/2015). O erro não está no conteúdo do julgamento (mérito), mas no modo como o procedimento foi conduzido — isso é error in procedendo. Como a causa não estava madura para julgamento, o pedido adequado na apelação é a ANULAÇÃO da sentença, para que o processo retome seu curso normal.", "B": "Incorreta. Erro material é erro evidente de grafia, cálculo ou denominação — corrigível de ofício. Nada a ver com o vício narrado.", "C": "Incorreta. Error in judicando é erro no conteúdo do julgamento (aplicação do direito, valoração da prova). O pedido seria de reforma. Aqui, o erro foi no procedimento — não no julgamento do mérito.", "D": "Incorreta. Começa certo (erro de procedimento), mas erra no pedido. A causa não estava madura para julgamento — havia extinção prematura e indevida. O pedido deve ser de anulação, não de julgamento do mérito pelo tribunal."}, fund:"Art. 485, §1º, CPC/2015: antes de extinguir por abandono, o juiz deve intimar pessoalmente o autor. Teoria dos erros recursais: error in procedendo = vício no procedimento = pedido de anulação; error in judicando = vício no julgamento = pedido de reforma.", caqui:"Bússola dos recursos: o erro foi no CAMINHO (procedimento) ou no DESTINO (julgamento)? Caminho errado = error in procedendo = pede ANULAÇÃO para refazer. Destino errado = error in judicando = pede REFORMA para substituir. Aqui: o juiz extinguiu sem intimar pessoalmente antes — errou no procedimento. A sentença não pode ser 'reformada' (não há mérito a reformar); ela precisa ser anulada para o processo continuar."},
  {num:4, exame:"XVI Exame — 2015", titulo:"Acórdão Não Unânime em Ação Rescisória — CPC/1973 vs CPC/2015", enunciado:"Rodolfo ingressou com ação rescisória de sentença prolatada em ação de cobrança, fundada na obtenção de documento novo. O pedido foi julgado improcedente pelo Tribunal de Justiça, por acórdão não unânime. A maioria dos julgadores entendeu que a parte sabia da existência do documento e não demonstrou o motivo de sua não utilização na ação original.", comando:"Assinale a opção que contém o recurso cabível contra o referido provimento jurisdicional.", gabarito:"A", alt:{"A": "Embargos infringentes.", "B": "Recursos especial e extraordinário.", "C": "Recurso ordinário constitucional.", "D": "O provimento judicial em questão é irrecorrível."}, fb:{"A": "Correta no contexto do CPC/1973 (vigente à época da prova — 2015). No CPC/73, os embargos infringentes eram cabíveis quando o acórdão não unânime julgasse improcedente ação rescisória — exatamente o caso narrado. ⚠️ ATENÇÃO: no CPC/2015, os embargos infringentes foram EXTINTOS e substituídos pela técnica de julgamento ampliado (art. 942, CPC/2015): quando o resultado da apelação (ou da ação rescisória) for não unânime, o julgamento é automaticamente ampliado com a convocação de outros julgadores — sem interposição de recurso pela parte.", "B": "Incorreta. RE e REsp pressupõem questão constitucional ou federal, com pré-questionamento. Não é o recurso imediato contra acórdão de TJ em rescisória nessa hipótese.", "C": "Incorreta. Recurso ordinário constitucional tem hipóteses específicas (MS, HC, HD em única instância pelos Tribunais Superiores; causas entre Estado estrangeiro/organismo internacional x Município/pessoa domiciliada no Brasil). Não se aplica aqui.", "D": "Incorreta. O acórdão é recorrível."}, fund:"CPC/1973 art. 530: embargos infringentes cabíveis contra acórdão não unânime que julgasse improcedente ação rescisória. CPC/2015 art. 942: técnica de julgamento ampliado substitui os embargos infringentes — sem necessidade de recurso da parte, o julgamento se amplia automaticamente quando não unânime.", caqui:"⚠️ ALERTA DE ATUALIZAÇÃO: esta questão é do CPC/1973. No regime ATUAL (CPC/2015), os embargos infringentes foram EXTINTOS. O que existe hoje é a TÉCNICA DE JULGAMENTO AMPLIADO (art. 942): se a apelação ou a ação rescisória resultar em decisão não unânime, o julgamento prossegue automaticamente com outros julgadores — sem que a parte precise interpor recurso. É a mesma função dos antigos infringentes, mas sem o ônus recursal. Para o Exame 47 (2026), sabe o art. 942!"},
  {num:5, exame:"XV Exame — 2014", titulo:"Liquidação de Sentença — Fase do Processo, Requerimento e Intimação", enunciado:"Raul ajuizou ação de indenização por danos materiais em face de Sérgio. O pedido foi julgado procedente, mas a determinação do valor exato da condenação dependia de apuração do quantum debeatur, relativo às consequências do ato ilícito.", comando:"Diante da atual sistemática do Código de Processo Civil, é correto afirmar que a liquidação de sentença, na hipótese", gabarito:"C", alt:{"A": "é considerada simples incidente processual, devendo o juiz, de ofício, iniciá-la, determinando a citação do réu.", "B": "constitui-se em processo autônomo, iniciado mediante requerimento da parte interessada, do qual será citado o réu.", "C": "constitui-se em fase do processo de conhecimento, iniciada mediante requerimento da parte interessada, do qual será intimada a parte contrária na pessoa de seu advogado.", "D": "constitui-se em procedimento autônomo, devendo o juiz, de ofício, iniciá-lo, mediante intimação das partes."}, fb:{"A": "Incorreta. A liquidação não se inicia de ofício pelo juiz — depende de requerimento. E não há nova citação: a parte já integra o processo.", "B": "Incorreta. A liquidação não é processo autônomo no CPC/2015 — é fase do processo. E não há citação do réu, mas intimação.", "C": "Correta! Art. 509 e ss., CPC/2015: a liquidação é FASE do processo de conhecimento (sincretismo processual), instaurada mediante REQUERIMENTO da parte interessada. A parte contrária é INTIMADA — não citada — na pessoa de seu advogado, pois já integra a relação processual.", "D": "Incorreta. A liquidação não é procedimento autônomo e não se inicia de ofício."}, fund:"Art. 509, CPC/2015: quando a sentença condenar ao pagamento de quantia ilíquida, procede-se à sua liquidação — fase do processo, a requerimento da parte, com intimação da contrária na pessoa do advogado.", caqui:"Três palavras-chave da liquidação no CPC/2015: FASE (não processo autônomo), REQUERIMENTO (não de ofício), INTIMAÇÃO (não citação). Se aparecer 'processo autônomo', 'citação', ou 'de ofício' nas alternativas, desconfie. A lógica é de sincretismo: tudo dentro do mesmo processo, sem recomeçar do zero."},
  {num:6, exame:"XIII Exame — 2014", titulo:"Recurso Ordinário Constitucional — Competências do STF e do STJ", enunciado:"A atividade recursal do Supremo Tribunal Federal e do Superior Tribunal de Justiça encontra-se tradicionalmente associada aos recursos extraordinário e especial, respectivamente. Contudo, tal múnus também é desempenhado por meio do julgamento do denominado recurso ordinário constitucional.", comando:"Acerca dessa espécie recursal, assinale a afirmativa correta.", gabarito:"D", alt:{"A": "Exigir-se-á a comprovação do requisito do pré-questionamento para a admissão do recurso ordinário constitucional perante os Tribunais Superiores.", "B": "Apenas será acolhido o recurso ordinário que versar sobre questões exclusivamente de direito, não se admitindo a rediscussão de matéria fática por meio desta via recursal.", "C": "Compete ao Supremo Tribunal Federal julgar o recurso ordinário interposto contra mandado de segurança decidido em única instância pelos Tribunais Regionais Federais ou pelos Tribunais dos estados, do Distrito Federal e dos territórios, quando denegatória a decisão.", "D": "Serão julgadas em recurso ordinário pelo Superior Tribunal de Justiça as causas em que forem partes, de um lado, Estado estrangeiro ou organismo internacional e, do outro, município ou pessoa residente ou domiciliada no país."}, fb:{"A": "Incorreta. Pré-questionamento é requisito típico do RE e do REsp — recursos de fundamentação vinculada. O ROC não exige pré-questionamento como os recursos excepcionais.", "B": "Incorreta. O ROC não tem a rigidez dos recursos excepcionais — não está limitado exclusivamente a questões de direito, podendo envolver rediscussão mais ampla conforme a hipótese.", "C": "Incorreta. Essa hipótese (MS denegatório em única instância por TRF ou TJ) é competência do STJ, não do STF. A banca trocou STF por STJ — pegadinha clássica.", "D": "Correta! Art. 105, II, c, CF: compete ao STJ julgar, em recurso ordinário, as causas em que forem partes, de um lado, Estado estrangeiro ou organismo internacional, e, de outro, Município ou pessoa residente ou domiciliada no Brasil."}, fund:"Art. 105, II, c, CF: ROC ao STJ nas causas entre Estado estrangeiro/organismo internacional x Município ou pessoa domiciliada no Brasil. Art. 102, II, CF: ROC ao STF nas hipóteses específicas de HC, MS, HD e MI em única instância pelos Tribunais Superiores.", caqui:"Mapa mental do ROC: STF julga ROC em HC, MS, HD, MI quando decididos EM ÚNICA INSTÂNCIA pelos Tribunais Superiores (STJ, TST, TSE, STM). STJ julga ROC em MS e HC denegatórios decididos em única/última instância por TRF ou TJ; E também nas causas entre Estado estrangeiro/organismo internacional x Município/pessoa domiciliada no Brasil. A FGV ama trocar STF por STJ (e vice-versa) — preste atenção no tribunal e na hipótese."},
  {num:7, exame:"VI Exame — 2012 (Reaplicação)", titulo:"Decisões Monocráticas do Relator — CPC/1973 e o que Mudou no CPC/2015", enunciado:"A respeito das decisões monocráticas proferidas pelo relator, assinale a alternativa correta.", comando:"A respeito das decisões monocráticas proferidas pelo relator, assinale a alternativa correta.", gabarito:"D", alt:{"A": "Caberá agravo no prazo de cinco dias ao órgão competente para o julgamento do recurso, não se admitindo juízo de retratação, devendo o relator proferir voto e apresentá-lo em mesa para julgamento.", "B": "Interposto o agravo infundado contra decisão monocrática, poderá o tribunal condenar o agravante ao pagamento de multa em favor do agravado, desde que não condicione a interposição de qualquer outro recurso ao depósito do valor.", "C": "Caso o agravante requeira a suspensão da decisão até o pronunciamento definitivo da turma ou câmara, ao argumento de iminente lesão grave, o relator não poderá se manifestar monocraticamente, devendo apresentar o processo em mesa.", "D": "Poderá o relator dar provimento ao recurso, caso a decisão recorrida esteja em manifesto confronto com súmula ou jurisprudência dominante do Supremo Tribunal Federal ou de Tribunal Superior."}, fb:{"A": "Incorreta. No sistema do agravo interno (CPC/73 e CPC/2015), admite-se juízo de retratação — o relator pode reconsiderar sua decisão antes de levar ao colegiado.", "B": "Incorreta. No regime do CPC/73, a multa por agravo infundado podia sim repercutir em outros recursos — a alternativa tentou suavizar essa consequência de forma incorreta.", "C": "Incorreta. O relator pode se manifestar monocraticamente sobre pedido de suspensão/tutela de urgência no recurso — não é obrigado a levar ao colegiado imediatamente.", "D": "Correta! No CPC/1973 (art. 557, §1º-A), o relator podia dar provimento monocrático ao recurso quando a decisão recorrida estivesse em manifesto confronto com súmula ou jurisprudência dominante do STF ou de Tribunal Superior. ⚠️ NO CPC/2015: o art. 932, V traz regra semelhante, mas condiciona a decisão a que antes seja facultada a apresentação de contrarrazões pelo recorrido — garantindo o contraditório antes do provimento monocrático."}, fund:"CPC/1973 art. 557, §1º-A: relator pode dar provimento monocrático quando decisão contraria súmula/jurisprudência dominante do STF ou Tribunal Superior. CPC/2015 art. 932, V: mantém a possibilidade, mas exige que já tenha sido facultada a apresentação de contrarrazões pelo recorrido antes do provimento.", caqui:"⚠️ ATUALIZAÇÃO IMPORTANTE: a lógica é semelhante entre os dois códigos (relator pode dar provimento monocrático), mas o CPC/2015 trouxe uma exigência a mais: ANTES de dar provimento, o relator precisa ter facultado ao recorrido a apresentação de contrarrazões — garantindo o contraditório (art. 932, V, CPC/2015). Decore esse detalhe para o Exame 47."},
  {num:8, exame:"VIII Exame — 2012", titulo:"Cumprimento de Sentença vs Liquidação — Valor por Cálculo Aritmético", enunciado:"Nos autos de ação indenizatória movida por Henrique em face de Paulo, transitou em julgado sentença de procedência, condenando o réu ao pagamento de indenização equivalente a 500 salários mínimos, na data da prolação da sentença, acrescidos de juros legais e correção monetária.", comando:"Assinale a alternativa que apresenta a providência a ser imediatamente adotada pelo advogado de Henrique.", gabarito:"B", alt:{"A": "Instauração da fase de liquidação de sentença por arbitramento, a fim de apurar o valor da condenação em moeda corrente.", "B": "Instauração da fase de cumprimento de sentença, com a apresentação da memória de cálculo contemplando o valor da condenação em moeda corrente.", "C": "Instauração da fase de liquidação de sentença por cálculos do contador, a fim de que o magistrado remeta os autos ao contador judicial, para que seja apurado o valor da condenação em moeda corrente.", "D": "Ajuizamento de ação rescisória, a fim de que o tribunal apure o valor da condenação em moeda corrente."}, fb:{"A": "Incorreta. Não há necessidade de arbitramento — o valor é determinável por simples cálculo aritmético a partir dos dados já fixados na sentença.", "B": "Correta! Art. 509, §2º, CPC/2015: quando a apuração do valor depender apenas de cálculo aritmético, o credor pode promover o cumprimento de sentença diretamente, apresentando a memória discriminada do cálculo. A sentença fixou 500 salários mínimos na data da prolação, com juros e correção — tudo determinável por cálculo, sem atividade cognitiva nova. Vai direto para o cumprimento.", "C": "Incorreta. Não é caso de liquidação — basta calcular. A sentença já contém todos os elementos.", "D": "Incorreta. Ação rescisória serve para desconstituir decisão com vício legal — não para 'apurar valor' de condenação."}, fund:"Art. 509, §2º, CPC/2015: quando a apuração do valor depender apenas de cálculo aritmético, o credor pode promover o cumprimento de sentença diretamente, apresentando memória discriminada do cálculo. Art. 524, CPC/2015: início do cumprimento de sentença por quantia certa.", caqui:"A pergunta certa não é 'o valor está em reais?' — é 'dá para chegar no valor fazendo só conta?' Se dá (como aqui: 500 salários mínimos na data X + juros legais + correção monetária), vai direto para o CUMPRIMENTO com memória de cálculo. Liquidação só quando precisar de PROVA NOVA — arbitramento, perícia, fatos a demonstrar. Aqui é só calculadora."},
  {num:9, exame:"VIII Exame — 2012", titulo:"Uniformização de Jurisprudência — CPC/1973 e IRDR no CPC/2015", enunciado:"A uniformização de jurisprudência é um instituto jurídico que tem por objetivo diminuir os impactos das divergências entre julgamentos do mesmo assunto. A respeito da uniformização de jurisprudência, assinale a afirmativa correta.", comando:"A respeito da uniformização de jurisprudência, assinale a afirmativa correta.", gabarito:"C", alt:{"A": "A uniformização de jurisprudência é um recurso capaz de provocar a votação acerca do melhor entendimento sobre determinado assunto a ser utilizado, quando houver no tribunal dois ou mais precedentes divergentes sobre o tema em questão.", "B": "A uniformização de jurisprudência é um procedimento que só será instaurado, levando à suspensão do processo que está no tribunal até sua resolução, se houver expresso requerimento das partes nesse sentido.", "C": "A divergência que permite a instauração da uniformização de jurisprudência é sempre verificada entre órgãos diversos do mesmo tribunal.", "D": "A decisão do órgão fracionário que reconhece a existência de divergência acerca da matéria ou deixa de fazê-lo pode ser impugnada por agravo de instrumento."}, fb:{"A": "Incorreta. Uniformização de jurisprudência NÃO é recurso — é incidente/procedimento voltado à harmonização da interpretação dentro do tribunal.", "B": "Incorreta. O incidente não dependia apenas de requerimento expresso das partes — podia ser provocado de outras formas durante o julgamento.", "C": "Correta! No CPC/1973, a uniformização de jurisprudência pressupunha divergência entre órgãos diversos do mesmo tribunal — câmaras, turmas, grupos ou seções divergindo sobre o mesmo ponto jurídico.", "D": "Incorreta. Agravo de instrumento não era o meio de impugnação previsto para essa hipótese no sistema da uniformização."}, fund:"CPC/1973 arts. 476-479: uniformização de jurisprudência — incidente para resolver divergência interna ao tribunal, entre seus órgãos fracionários. CPC/2015: substituído pelo IRDR (arts. 976-987) e pelo IAC (art. 947).", caqui:"⚠️ ATUALIZAÇÃO TOTAL: no CPC/2015, a uniformização de jurisprudência do CPC/73 FOI SUBSTITUÍDA por dois mecanismos: (1) IRDR — Incidente de Resolução de Demandas Repetitivas (arts. 976-987): para questões repetitivas de direito, suspende os processos relacionados e forma tese vinculante. (2) IAC — Incidente de Assunção de Competência (art. 947): para questão de grande relevância com divergência interna. Para o Exame 47 (2026), sabe o IRDR e o IAC — não a 'uniformização' do CPC/73!"},
  {num:10, exame:"VII Exame — 2012", titulo:"Cabimento da Ação Rescisória — Documento Novo", enunciado:"Nos termos do CPC, cabe ação rescisória", comando:"Nos termos do CPC, cabe ação rescisória", gabarito:"C", alt:{"A": "quando proposta pelo Ministério Público, caso não tenha sido ouvido em processo em que lhe era obrigatória a intervenção, salvo se a sentença de mérito for efeito de colusão das partes.", "B": "na hipótese em que se verifique fundamento para invalidar confissão, ainda que nessa não tenha se baseado a sentença, ou quando em erro de fato for fundada a sentença de mérito.", "C": "depois de transitada em julgado a sentença de mérito, o autor obtiver documento novo, cuja existência ignorava, capaz, por si só, de lhe assegurar pronunciamento favorável.", "D": "quando a sentença de mérito for proferida por juiz relativamente incompetente, ou for verificada que foi dada por concussão, prevaricação ou corrupção do juiz."}, fb:{"A": "Incorreta. A redação está embaralhada. A hipótese do MP que não foi ouvido quando obrigatória a intervenção existe (art. 966, II, CPC/2015), mas a ressalva sobre colusão foi inserida de forma incorreta na alternativa.", "B": "Incorreta. O trecho 'ainda que nessa não tenha se baseado a sentença' invalida a alternativa. Para que a invalidade de confissão fundamente rescisória, é necessário que a sentença rescindenda tenha se baseado nessa confissão.", "C": "Correta! Art. 966, VII, CPC/2015: cabe ação rescisória quando, depois do trânsito em julgado, o autor obtiver prova nova cuja existência ignorava ou de que não pôde fazer uso, capaz, por si só, de lhe assegurar pronunciamento favorável. No CPC/2015, a hipótese foi atualizada de 'documento novo' para 'prova nova' — abrangendo mais tipos de prova além de documentos.", "D": "Incorreta. A hipótese de incompetência na rescisória é ABSOLUTA — não relativa. Juízo relativamente incompetente não fundamenta rescisória. A parte sobre concussão/prevaricação/corrupção está correta, mas o defeito no item sobre incompetência relativa contamina a alternativa."}, fund:"Art. 966, VII, CPC/2015: rescisória quando a parte obtiver prova nova (CPC/2015 ampliou de 'documento' para 'prova') cuja existência ignorava ou não pôde usar, capaz de assegurar pronunciamento favorável. Incompetência na rescisória = apenas a absoluta (art. 966, II).", caqui:"Duas pegadinhas clássicas: (1) Incompetência na rescisória: só a ABSOLUTA (exemplo: vara criminal julgando matéria cível exclusiva). Incompetência RELATIVA não fundamenta rescisória. (2) No CPC/2015, a hipótese evoluiu de 'documento novo' para 'PROVA NOVA' — mais amplo. A confissão/transação só fundamenta rescisória se a sentença se baseou nelas. Guarde: a rescisória existe para hipóteses taxativas e específicas, não como recurso tardio genérico."},
  {num:11, exame:"V Exame — 2011", titulo:"Liquidação de Sentença — Arbitral, Juizados e Antes do Trânsito em Julgado", enunciado:"A respeito da liquidação de sentença, assinale a alternativa correta.", comando:"A respeito da liquidação de sentença, assinale a alternativa correta.", gabarito:"A", alt:{"A": "Para que a sentença arbitral seja liquidada, será necessária a instauração de processo judicial, com a citação da parte sucumbente.", "B": "É cabível a liquidação de sentença no procedimento dos Juizados Especiais Cíveis Estaduais.", "C": "É incabível a liquidação de sentença antes do trânsito em julgado da sentença liquidanda.", "D": "A liquidação por artigos corresponde à espécie de liquidação de sentença em que não poderá ser produzida prova pericial para a apuração do valor da condenação."}, fb:{"A": "Correta no contexto cobrado: a sentença arbitral é título executivo judicial (art. 515, VII, CPC/2015). Se for ilíquida, a apuração do valor se dará por liquidação judicial. No CPC/2015, a liquidação é fase do processo — a parte contrária é INTIMADA (não citada no sentido técnico de citação inicial). O gabarito original usa 'citação', reflexo da linguagem do CPC/73.", "B": "Incorreta. Nos Juizados Especiais Cíveis, a sentença deve ser líquida ou liquidável de forma simplificada — não há a fase de liquidação nos moldes do procedimento comum.", "C": "Incorreta. Art. 512, CPC/2015: a liquidação pode ser promovida mesmo na pendência de recurso, processando-se em autos apartados no juízo de origem.", "D": "Incorreta. A liquidação por artigos (que no CPC/2015 é chamada de liquidação quando houver necessidade de alegar e provar fato novo) admite produção probatória ampla, incluindo prova pericial."}, fund:"Art. 515, VII, CPC/2015: sentença arbitral é título executivo judicial. Art. 512: liquidação pode ocorrer antes do trânsito em julgado, em autos apartados. Art. 509, I (arbitramento) e II (artigos/fato novo): espécies de liquidação — ambas admitem prova pericial.", caqui:"Quatro armadilhas sobre liquidação: (1) SENTENÇA ARBITRAL ilíquida = liquidação judicial (sentença arbitral é título executivo judicial). (2) JUIZADO ESPECIAL = sem fase de liquidação do procedimento comum. (3) ANTES DO TRÂNSITO = pode liquidar, em autos apartados. (4) LIQUIDAÇÃO POR FATO NOVO (antigas 'artigos') = admite qualquer prova, inclusive pericial. Decore essas quatro exceções/regras."},
  {num:12, exame:"IV Exame — 2011", titulo:"Desistência da Ação, do Recurso e da Execução", enunciado:"No âmbito do Direito Processual Civil, os legitimados ativos que proponham ação e interponham recursos poderão desistir deles, desde que respeitados os seguintes termos:", comando:"No âmbito do Direito Processual Civil, os legitimados ativos que proponham ação e interponham recursos poderão desistir deles, desde que respeitados os seguintes termos:", gabarito:"A", alt:{"A": "o credor poderá desistir de toda execução ou apenas de algumas medidas executivas, desde que suporte as custas e honorários advocatícios decorrentes da extinção dos embargos que versarem somente sobre questões processuais e, nos demais casos, quando houver anuência do embargante.", "B": "o recorrente poderá desistir do recurso interposto a qualquer tempo, desde que não se trate de litisconsórcio e que a parte contrária, uma vez intimada, manifeste expressamente sua anuência.", "C": "na intervenção de terceiros, a assistência obsta a que a parte principal desista da ação, que somente poderá ocorrer com a anuência expressa do assistente. Nesse caso, a desistência independe de homologação por sentença.", "D": "a desistência da ação, que produz efeitos somente depois de homologada por sentença, implica extinção do processo com resolução do mérito. Caso tenha transcorrido o prazo para resposta do réu, o pedido de desistência estará sujeito ao seu consentimento."}, fb:{"A": "Correta! Art. 775, CPC/2015: o exequente pode desistir de toda a execução ou de apenas algumas medidas executivas. Havendo embargos à execução, a desistência implica que o exequente responde pelas custas e honorários; se os embargos versarem sobre questões processuais, a extinção ocorre com o pagamento das custas. Nos demais casos (embargos com mérito), a desistência fica condicionada à anuência do embargante.", "B": "Incorreta. A desistência do recurso NÃO depende de anuência da parte contrária — o recorrente pode desistir livremente (art. 998, CPC/2015). A exigência de 'anuência expressa da parte contrária' não existe para desistência do recurso.", "C": "Incorreta. O assistente não impede a desistência da ação pela parte principal — ele não tem esse poder de veto. A desistência também NÃO independe de homologação — ela produz efeitos apenas após ser homologada por sentença.", "D": "Incorreta. A desistência da ação leva à extinção SEM resolução do mérito (art. 485, VIII, CPC/2015), não COM resolução."}, fund:"Art. 775, CPC/2015: desistência da execução. Art. 998, CPC/2015: desistência do recurso — independe de concordância do recorrido. Art. 485, VIII e §4º: desistência da ação — extinção sem resolução do mérito, condicionada ao consentimento do réu se já oferecida contestação.", caqui:"Três institutos, três regras diferentes: DESISTÊNCIA DA AÇÃO = extingue SEM mérito + após contestação precisa de anuência do réu. DESISTÊNCIA DO RECURSO = livre, não precisa de anuência do recorrido. DESISTÊNCIA DA EXECUÇÃO = exequente pode desistir de tudo ou de parte; havendo embargos com mérito, precisa da anuência do embargante. A FGV ama trocar as regras entre esses três institutos."},
  {num:13, exame:"IV Exame — 2011", titulo:"Liquidação Pendente de Recurso — Autos Apartados", enunciado:"Quando a sentença que reconhece obrigação de pagar não determina o valor devido, procede-se à sua liquidação, para que, então, possa dar-se o seu cumprimento. Em relação à sistemática da liquidação no direito brasileiro, assinale a alternativa correta.", comando:"Em relação à sistemática da liquidação no direito brasileiro, assinale a alternativa correta.", gabarito:"B", alt:{"A": "A liquidação de sentença tem natureza jurídica de ação autônoma.", "B": "A liquidação pode ser requerida mesmo na pendência de recurso ainda não julgado pelo tribunal, hipótese em que deve ser processada em autos apartados no juízo de origem.", "C": "Requerida a liquidação, deve a parte contrária ser pessoalmente intimada.", "D": "Sempre que o pedido for genérico, o juiz pode proferir sentença ilíquida."}, fb:{"A": "Incorreta. Liquidação NÃO é ação autônoma no CPC/2015 — é fase do processo (sincretismo processual).", "B": "Correta! Art. 512, CPC/2015: a liquidação pode ser requerida mesmo na pendência de recurso ainda não julgado. Nessa hipótese, é processada em autos apartados, no juízo de origem que proferiu a sentença. Isso permite que a parte já vá preparando a apuração do valor enquanto o mérito ainda está sendo discutido no tribunal.", "C": "Incorreta. A parte contrária é INTIMADA na pessoa do advogado — não é necessária intimação pessoal, pois o processo já existe.", "D": "Incorreta. O uso do 'sempre' torna a alternativa incorreta. O juiz não pode proferir sentença ilíquida sempre que o pedido for genérico — há hipóteses específicas em que a sentença ilíquida é admitida (quando não for possível determinar o valor na fase cognitiva), e outras em que o pedido já poderia ser liquidado."}, fund:"Art. 512, CPC/2015: a liquidação pode ser promovida na pendência de recurso, processando-se em autos apartados no juízo de origem. Art. 509: liquidação como fase do processo, por requerimento, com intimação do advogado da parte contrária.", caqui:"A liquidação provisória (antes do trânsito) é uma estratégia inteligente: o credor não precisa esperar o recurso ser julgado para começar a apurar o valor. Corre em autos apartados no juízo de origem, paralelamente ao recurso no tribunal. Se o recurso for provido e a condenação cair, a liquidação foi inútil — mas se mantida, já está pronta para o cumprimento."},
  {num:14, exame:"III Exame — 2011", titulo:"Agravo de Instrumento — Juntada nos Autos de Origem (CPC/1973)", enunciado:"Em um processo com rito comum ordinário, o juiz profere decisão interlocutória contrária ao réu, com risco de dano grave. O advogado prepara agravo de instrumento com todos os requisitos, mas deixou de requerer, no prazo legal, a juntada nos autos de origem de cópia da petição do agravo e do comprovante de sua interposição, fato que foi arguido e provado pelo agravado.", comando:"Com base no relatado acima, assinale a alternativa correta a respeito da consequência processual decorrente.", gabarito:"B", alt:{"A": "Haverá prosseguimento normal do recurso, pois tal juntada caracteriza mera faculdade do agravante.", "B": "Não será admitido o agravo de instrumento.", "C": "O agravo de instrumento será julgado pelo tribunal, inviabilizando-se, apenas, o exercício do juízo de retratação pelo magistrado.", "D": "Estará caracterizada a litigância de má-fé, por força de prática de ato processual manifestamente protelatório, devendo a parte agravante ser sancionada, e o feito, extinto sem resolução do mérito."}, fb:{"A": "Incorreta. No CPC/1973, essa juntada não era mera faculdade — era ônus processual do agravante. Sua omissão, quando arguida e provada pelo agravado, gerava consequências.", "B": "Correta no contexto do CPC/1973: a falta de juntada da cópia da petição do agravo e do comprovante de interposição nos autos de origem, quando arguida e provada pelo agravado, resultava na inadmissibilidade do agravo de instrumento.", "C": "Incorreta. A consequência não era apenas impedir o juízo de retratação — era a inadmissibilidade do recurso.", "D": "Incorreta. A omissão não configura automaticamente litigância de má-fé, e a consequência não é extinção do feito."}, fund:"CPC/1973: o agravante tinha que juntar nos autos de origem, no prazo legal, cópia da petição do agravo e do comprovante de interposição — sob pena de inadmissibilidade. CPC/2015 art. 1.018: EXTINÇÃO DESSA EXIGÊNCIA — o CPC/2015 não exige mais a juntada de cópia nos autos de origem. Essa providência foi abolida.", caqui:"⚠️ ALERTA: esta questão é DO CPC/1973. No CPC/2015, essa exigência de juntada de cópia nos autos de origem foi EXTINTA. O agravo de instrumento no CPC/2015 (arts. 1.015-1.020) tem hipóteses taxativas de cabimento, mas não exige mais essa providência de 'avisar' o juízo de origem com cópia da petição. Para o Exame 47 (2026), o agravo de instrumento atual NÃO tem essa exigência."},
  {num:15, exame:"3º Exame — 2010 (CESPE)", titulo:"Desistência Parcial ou Total do Recurso", enunciado:"Com relação aos recursos, assinale a opção correta.", comando:"Com relação aos recursos, assinale a opção correta.", gabarito:"B", alt:{"A": "Se o relator deferir, em antecipação de tutela, a pretensão recursal, da decisão caberá agravo.", "B": "O recorrente pode desistir, parcial ou totalmente, do recurso interposto.", "C": "Caberá apelação da decisão do juiz singular que excluir da lide uma das partes, por ilegítima, prosseguindo o processo em relação à outra.", "D": "Do acórdão que reformar sentença terminativa, por maioria de votos, caberão embargos infringentes."}, fb:{"A": "Incorreta no regime atual. No CPC/2015, a tutela antecipada recursal concedida pelo relator é atacada por agravo interno ao colegiado (art. 1.021), não simplesmente 'agravo' de forma genérica como a alternativa sugere.", "B": "Correta! Art. 998, CPC/2015: o recorrente pode desistir do recurso total ou parcialmente. A desistência independe de concordância do recorrido e pode ser de todo o recurso ou de parte dos capítulos impugnados.", "C": "Incorreta. A decisão que exclui uma das partes do processo, mas não encerra o processo quanto às demais, tem natureza de decisão interlocutória — não de sentença. No CPC/2015, caberá agravo de instrumento se a hipótese estiver no art. 1.015, ou haverá preclusão.", "D": "Incorreta. Embargos infringentes foram EXTINTOS no CPC/2015. A hipótese descrita (acórdão não unânime reformando sentença) está sujeita à técnica de julgamento ampliado do art. 942, CPC/2015."}, fund:"Art. 998, CPC/2015: desistência do recurso — total ou parcial, sem necessidade de concordância do recorrido. Art. 942: técnica de julgamento ampliado substitui os embargos infringentes.", caqui:"Regra simples da desistência recursal: o recurso pertence a quem recorreu. Quer tirar? Pode — total ou parcialmente, sem pedir licença para a outra parte. A FGV ama inventar 'anuência do recorrido' como requisito — isso NÃO EXISTE. E lembre: embargos infringentes no CPC/2015 = inexistentes. Se aparecer em questão atual, é erro."},
  {num:16, exame:"I Exame — 2010 (CESPE)", titulo:"Ação Rescisória — Prazo Decadencial, Legitimidade e Juizados", enunciado:"A ação rescisória", comando:"A ação rescisória", gabarito:"D", alt:{"A": "não pode ser ajuizada por terceiro, ainda que juridicamente interessado.", "B": "será admitida no âmbito dos juizados especiais cíveis quando houver sentença transitada em julgado.", "C": "deverá ser ajuizada até dois anos após o trânsito em julgado da última decisão, sob pena de prescrição.", "D": "é admitida ainda que não se tenham esgotado todos os recursos contra a sentença transitada em julgado."}, fb:{"A": "Incorreta. Terceiro juridicamente interessado tem legitimidade para propor ação rescisória (art. 967, II, CPC/2015). A legitimidade não se limita às partes originárias do processo.", "B": "Incorreta. No sistema dos Juizados Especiais Cíveis (Lei 9.099/95), NÃO cabe ação rescisória. A simplicidade e celeridade do sistema são incompatíveis com esse mecanismo. Eventual revisão de decisão transitada em julgado no JEC usa outros instrumentos.", "C": "Incorreta. O prazo é DECADENCIAL (não prescricional) de 2 anos (art. 975, CPC/2015). Erro clássico confundir decadência com prescrição aqui.", "D": "Correta! A ação rescisória exige que a decisão tenha transitado em julgado — não que a parte tenha esgotado todos os recursos possíveis. Se a parte optou por não recorrer e a decisão transitou em julgado, ainda assim pode propor rescisória se presente hipótese legal (art. 966, CPC/2015)."}, fund:"Art. 967, CPC/2015: legitimados — parte interessada, terceiro prejudicado, MP. Art. 975: prazo DECADENCIAL de 2 anos do trânsito em julgado da última decisão. Lei 9.099/95: sem ação rescisória no JEC.", caqui:"Quatro regras básicas da rescisória: (1) QUEM pode propor: partes, terceiro juridicamente interessado, MP (quando obrigado a intervir e não foi, ou quando a sentença for fruto de colusão). (2) PRAZO: 2 anos DECADENCIAIS do trânsito em julgado da última decisão. (3) JEC: não cabe rescisória. (4) NÃO PRECISA ter esgotado todos os recursos — só precisa haver trânsito em julgado."},
  {num:17, exame:"2º Exame — 2010 (CESPE)", titulo:"Efeito Expansivo Subjetivo do Recurso", enunciado:"A respeito dos recursos, assinale a opção correta.", comando:"A respeito dos recursos, assinale a opção correta.", gabarito:"D", alt:{"A": "O recebimento do recurso de apelação pelo juiz comporta a interposição de recurso de agravo de instrumento.", "B": "Tratando-se de sentença ultra ou extra petita, o autor não detém interesse em recorrer.", "C": "Cabe ação direta de inconstitucionalidade contra súmula vinculante, nas mesmas hipóteses relacionadas à lei em sentido formal.", "D": "Ocorre o efeito expansivo subjetivo quando o julgamento do recurso atinge outras pessoas além do recorrente e do recorrido."}, fb:{"A": "Incorreta. No CPC/2015, não existe mais agravo de instrumento contra o recebimento da apelação (que, aliás, não é mais feito pelo juiz singular — a apelação é recebida pelo tribunal). O sistema mudou.", "B": "Incorreta. Em caso de sentença ultra ou extra petita, o autor PODE ter interesse em recorrer — depende da situação. Se o julgamento foi além do pedido (ultra) ou sobre coisa diversa (extra), pode haver sucumbência reflexa ou necessidade de adequar o dispositivo.", "C": "Incorreta. Súmula vinculante não é objeto de ADI — é editada pelo STF e pode ser questionada por reclamação constitucional. Não se controla súmula por ADI como se controla lei.", "D": "Correta! Efeito expansivo subjetivo: o julgamento do recurso produz efeitos que alcançam pessoas além do recorrente e do recorrido. Exemplo clássico: em litisconsórcio unitário, o recurso de um beneficia os demais (art. 1.005, CPC/2015)."}, fund:"Art. 1.005, CPC/2015: o recurso interposto por um dos litisconsortes a todos aproveita, salvo se distintos ou opostos seus interesses — efeito expansivo subjetivo. Teoria geral dos recursos: efeito expansivo objetivo (amplia o objeto do julgamento) vs. subjetivo (amplia os sujeitos afetados).", caqui:"Efeitos do recurso — dois tipos de expansão: OBJETIVA = o tribunal pode apreciar questões além das impugnadas (ex: nulidades de ofício). SUBJETIVA = a decisão recursal atinge pessoas além de quem recorreu e quem foi recorrido (ex: litisconsórcio unitário: um recorre, o acórdão aproveita a todos). A FGV ama cobrar essa classificação de efeitos."},
  {num:18, exame:"1º Exame — 2009 (CESPE)", titulo:"Agravo de Instrumento — CPC/1973 vs CPC/2015", enunciado:"A respeito do agravo, assinale a opção correta.", comando:"A respeito do agravo, assinale a opção correta.", gabarito:"D", alt:{"A": "O novo regime jurídico de impugnação das decisões interlocutórias estabelece como regra que o recurso contra essas decisões é o agravo de instrumento.", "B": "O agravo será na forma retida quando interposto contra decisão que não tenha admitido a apelação.", "C": "Não se admite juízo de retratação no agravo retido.", "D": "O recurso cujo objetivo seja o reexame da decisão do juiz sobre os efeitos em que foi recebida a apelação é o agravo de instrumento."}, fb:{"A": "Incorreta. No CPC/1973 (regime cobrado pela questão de 2009), o agravo de instrumento NÃO era a regra geral — o agravo retido era o padrão para a maioria das interlocutórias. ⚠️ NO CPC/2015: a lógica mudou completamente — o agravo retido foi EXTINTO e o agravo de instrumento tem hipóteses TAXATIVAS (art. 1.015). As decisões não contempladas no art. 1.015 ficam sujeitas à preclusão, podendo ser impugnadas em preliminar de apelação.", "B": "Incorreta. No CPC/73, a decisão que não admite a apelação era atacada por agravo de instrumento — não por agravo retido.", "C": "Incorreta. O agravo retido admitia sim juízo de retratação — o juiz podia reconsiderar sua decisão antes de remeter o processo ao tribunal.", "D": "Correta no contexto do CPC/1973: a decisão que trata dos efeitos em que a apelação foi recebida era atacada por agravo de instrumento."}, fund:"CPC/1973: agravo retido como regra; agravo de instrumento como exceção. CPC/2015: agravo retido EXTINTO; agravo de instrumento com hipóteses taxativas (art. 1.015); decisões não listadas = preclusão e impugnação em preliminar de apelação.", caqui:"⚠️ MUDANÇA RADICAL no CPC/2015: o agravo retido foi EXTINTO. Hoje: agravo de instrumento = hipóteses taxativas do art. 1.015 (tutela provisória, mérito do processo, rejeição de alegação de convenção de arbitragem, incidente de desconsideração, rejeição de pedido de gratuidade, exclusão de litisconsorte, dentre outras). Se a interlocutória não está no art. 1.015 = preclusão imediata, impugna em preliminar de apelação. Para o Exame 47, decore o art. 1.015!"},
  {num:19, exame:"1º Exame — 2009 (CESPE)", titulo:"Recurso Adesivo em Sucumbência Recíproca", enunciado:"Considerando o que dispõe o CPC a respeito de recursos, assinale a opção correta.", comando:"Considerando o que dispõe o CPC a respeito de recursos, assinale a opção correta.", gabarito:"C", alt:{"A": "O MP tem legitimidade para recorrer somente no processo em que é parte.", "B": "A desistência do recurso interposto pelo recorrente depende da concordância do recorrido.", "C": "Havendo sucumbência recíproca e sendo proposta apelação por uma parte, será cabível a interposição de recurso adesivo pela outra parte.", "D": "A procuração geral para o foro, conferida por instrumento público, habilita o advogado a desistir do recurso."}, fb:{"A": "Incorreta. O Ministério Público pode recorrer tanto quando é parte quanto quando atua como fiscal da ordem jurídica (custos legis) — art. 996, parágrafo único, CPC/2015.", "B": "Incorreta. A desistência do recurso independe de concordância do recorrido (art. 998, CPC/2015). O recorrente pode desistir livremente.", "C": "Correta! Art. 997, §§1º e 2º, CPC/2015: o recurso adesivo é cabível quando, havendo sucumbência recíproca, a outra parte — que também sucumbiu mas não recorreu — pretende recorrer de forma subordinada ao recurso principal já interposto. Se a apelação principal for inadmitida ou desistida, o recurso adesivo perde sua razão de ser.", "D": "Incorreta. Desistência do recurso é ato dispositivo que exige poderes especiais — não está abrangida pela procuração geral para o foro (art. 105, CPC/2015)."}, fund:"Art. 997, CPC/2015: recurso principal e adesivo; §§1º e 2º: o adesivo é subordinado ao principal e segue seus mesmos requisitos de admissibilidade. Art. 105: procuração geral não confere poder para desistir de recurso — necessita de cláusula específica.", caqui:"Recurso adesivo = 'eu também perdi um pouco, mas só recorro se você recorrer'. Três requisitos: (1) sucumbência recíproca; (2) recurso principal já interposto pela outra parte; (3) interposição na resposta ao recurso principal, no prazo para contrarrazões. Detalhe importante: se o recurso principal for inadmitido ou a parte desistir, o adesivo também cai — é subordinado. E procuração geral para o foro NÃO basta para desistir de recurso — precisa de poderes especiais."},
  {num:20, exame:"3º Exame — 2008 (CESPE)", titulo:"Recurso Especial — Conhecimento e Provimento como Etapas Distintas", enunciado:"No que se refere a matéria de recursos cíveis e à atuação do Superior Tribunal de Justiça (STJ), assinale a opção correta.", comando:"No que se refere a matéria de recursos cíveis e à atuação do Superior Tribunal de Justiça (STJ), assinale a opção correta.", gabarito:"C", alt:{"A": "A cognição do STJ, no julgamento do recurso especial, abrange as questões de fato, podendo a Corte reexaminar a prova produzida.", "B": "Conhecimento e provimento de um recurso são expressões equivalentes.", "C": "Pode o STJ conhecer de um recurso especial e, no mérito, dar-lhe ou negar-lhe provimento.", "D": "Pode o STJ conhecer de recurso especial interposto sob a alegação de que a decisão recorrida violou diretamente a Constituição Federal."}, fb:{"A": "Incorreta. No recurso especial, o STJ NÃO reexamina fatos e provas. Súmula 7/STJ: 'a pretensão de simples reexame de prova não enseja recurso especial'. O REsp serve à uniformização da interpretação de lei federal infraconstitucional.", "B": "Incorreta. São etapas distintas: CONHECIMENTO = juízo de admissibilidade (verificar se o recurso preenche os requisitos para ser analisado). PROVIMENTO/DESPROVIMENTO = juízo de mérito (acolher ou rejeitar a pretensão recursal). Pode conhecer e negar provimento — são coisas diferentes.", "C": "Correta! O STJ pode (1) não conhecer do recurso especial se ausentes os requisitos de admissibilidade; ou (2) conhecer do recurso e, no mérito, dar-lhe provimento (reformando a decisão) ou negar-lhe provimento (mantendo a decisão recorrida). Estas são etapas distintas do julgamento.", "D": "Incorreta. Violação direta à Constituição é matéria de recurso extraordinário ao STF — não de recurso especial ao STJ. O REsp serve à interpretação de lei federal infraconstitucional."}, fund:"Art. 105, III, CF: REsp ao STJ por violação de lei federal ou divergência entre tribunais. Súmula 7/STJ: sem reexame de prova em REsp. Conhecimento ≠ provimento: etapas distintas do julgamento recursal.", caqui:"Dois vocabulários técnicos essenciais: CONHECER = admitir o recurso para análise de mérito. PROVER = acolher o recurso no mérito. O tribunal pode 'conhecer e prover', 'conhecer e desprover', ou 'não conhecer' (sem chegar ao mérito). E nunca confunda STJ (lei federal infraconstitucional) com STF (Constituição). Súmula 7/STJ é regra de ouro: sem reexame de fatos e provas no REsp."},
  {num:21, exame:"3º Exame — 2008 (CESPE)", titulo:"Agravo de Instrumento — Hipóteses de Cabimento (CPC/1973 e CPC/2015)", enunciado:"De acordo com o sistema recursal do Código de Processo Civil, o agravo de instrumento pode ser interposto, entre outros atos judiciais,", comando:"De acordo com o sistema recursal do Código de Processo Civil, o agravo de instrumento pode ser interposto, entre outros atos judiciais,", gabarito:"D", alt:{"A": "do ato pelo qual o juiz determina a juntada de documento produzido pela parte.", "B": "do ato pelo qual o juiz decide os embargos à execução fundada em título executivo extrajudicial.", "C": "do ato pelo qual o juiz ordena a anotação, no registro de distribuição, do oferecimento de reconvenção.", "D": "do ato pelo qual o juiz julga a liquidação de sentença."}, fb:{"A": "Incorreta. Determinação de juntada de documento é mero despacho de expediente — sem conteúdo decisório apto a ensejar agravo de instrumento.", "B": "Incorreta. A decisão que julga embargos à execução tem natureza de SENTENÇA — recorrível por apelação, não por agravo de instrumento.", "C": "Incorreta. Ato de anotação no registro de distribuição é mero ato ordinatório/cartorário — sem conteúdo decisório recorrível.", "D": "Correta no contexto do CPC/1973: a decisão que julgava a liquidação de sentença era atacada por agravo de instrumento. ⚠️ NO CPC/2015: a jurisprudência do STJ, mesmo na vigência do novo Código, é firme no sentido de que a decisão que julga a liquidação de sentença sem extinguir a fase de cumprimento é apelável, e não agravável — por se equiparar, nesse ponto, a uma sentença (art. 203, §1º)."}, fund:"CPC/1973: decisão de liquidação = agravo de instrumento. CPC/2015: jurisprudência pacífica do STJ — decisão que julga a liquidação de sentença, sem extinguir a fase de cumprimento, é apelável (não agravável), por se equiparar a sentença (art. 203, §1º, CPC/2015).", caqui:"⚠️ MUDANÇA IMPORTANTE: no CPC/1973, liquidação = agravo. No CPC/2015, o STJ pacificou que a decisão que julga a liquidação tem natureza de SENTENÇA (encerra a fase de liquidação) e é recorrível por APELAÇÃO — mesmo sem extinguir o processo como um todo, já que o cumprimento de sentença ainda vai continuar. O art. 1.015 traz as hipóteses taxativas de agravo de instrumento — decisão sobre liquidação não está lá. Para o Exame 47, lembre: liquidação julgada = APELAÇÃO."},
  {num:22, exame:"1º Exame OAB-SP — 2008 (CESPE)", titulo:"Ação Rescisória — Depósito de 5%, Incompetência e Competência", enunciado:"No que se refere à ação rescisória, assinale a opção correta.", comando:"No que se refere à ação rescisória, assinale a opção correta.", gabarito:"A", alt:{"A": "O depósito prévio de 5% sobre o valor da causa será revertido em benefício do réu somente quando a ação rescisória for declarada, por unanimidade, inadmissível ou improcedente.", "B": "A incompetência relativa do juízo constitui fundamento para a propositura de ação rescisória.", "C": "Em se tratando de ação rescisória sob o fundamento de colusão entre as partes, o Ministério Público não detém legitimidade para atuar no processo como custos legis.", "D": "A turma recursal dos juizados especiais cíveis tem competência para processar e julgar ação rescisória."}, fb:{"A": "Correta! Art. 968, II, CPC/2015: para propor ação rescisória, o autor deve depositar 5% sobre o valor da causa. Esse valor é revertido ao réu quando a ação for declarada inadmissível ou improcedente POR UNANIMIDADE. Se houver voto vencido (não unânime), o depósito é revertido ao réu apenas na proporção dos votos que a condenaram.", "B": "Incorreta. Apenas a incompetência ABSOLUTA pode fundamentar ação rescisória (art. 966, II, CPC/2015). Incompetência RELATIVA gera apenas anulação do processo na fase oportuna, mas não rescisória.", "C": "Incorreta. Em se tratando de colusão entre as partes para fraudar a lei, o MP tem sim legitimidade para propor a ação rescisória (art. 967, III, b, CPC/2015) e pode atuar como custos legis nas rescisórias.", "D": "Incorreta. Turma Recursal dos Juizados Especiais Cíveis não tem competência para processar e julgar ação rescisória. Os Juizados não comportam rescisória — é vedada pela lógica do sistema."}, fund:"Art. 968, II, CPC/2015: depósito de 5% + reversão ao réu por unanimidade. Art. 966, II: incompetência absoluta como fundamento rescindente. Art. 967, III, b: MP tem legitimidade para rescisória em caso de colusão. Lei 9.099/95: sem rescisória nos Juizados.", caqui:"Quatro pontos da rescisória num só: (1) Depósito de 5% = filtro contra uso abusivo; revertido ao réu quando UNANIMEMENTE inadmitida/improcedente. (2) Incompetência ABSOLUTA = rescindir; RELATIVA = não. (3) MP tem legitimidade em casos de colusão — e pode atuar como custos legis. (4) JEC = sem rescisória, sem Turma Recursal competente. Esses quatro pontos viram questão com frequência."},
  {num:23, exame:"1º Exame OAB-SP — 2008 (CESPE)", titulo:"Teoria Geral dos Recursos — Prazo, Desistência e Preparo", enunciado:"No que concerne à teoria geral dos recursos, assinale a opção correta.", comando:"No que concerne à teoria geral dos recursos, assinale a opção correta.", gabarito:"C", alt:{"A": "Para que a desistência do recurso produza efeitos, são necessárias a concordância do recorrido e a homologação judicial.", "B": "Admite-se, excepcionalmente, a interposição de recurso contra despacho proferido pelo magistrado.", "C": "O prazo para a interposição do recurso conta-se a partir da data da leitura da sentença em audiência, da intimação da decisão judicial ou da publicação do dispositivo do acórdão no órgão oficial.", "D": "Exige-se o preparo na interposição do agravo retido."}, fb:{"A": "Incorreta. A desistência do recurso NÃO depende de concordância do recorrido — é ato unilateral do recorrente (art. 998, CPC/2015). Pode prescindir até de homologação em algumas hipóteses.", "B": "Incorreta. Em regra, DESPACHOS são irrecorríveis (art. 1.001, CPC/2015). Não há hipótese de recurso 'excepcional' contra mero despacho de expediente.", "C": "Correta! Art. 1.003, CPC/2015: o prazo para interposição do recurso conta-se da data em que os advogados, a sociedade de advogados, a Defensoria Pública, o MP ou a parte foram intimados. A ciência pode ocorrer por: leitura da sentença em audiência (para quem estava presente), intimação da decisão, ou publicação no órgão oficial. O prazo nasce da ciência oficial.", "D": "Incorreta. No CPC/1973, o agravo retido era isento de preparo. No CPC/2015, o agravo retido foi EXTINTO — portanto, a questão do preparo do agravo retido é historicamente relevante, mas o agravo retido já não existe mais."}, fund:"Art. 1.003, CPC/2015: prazo recursal conta-se da intimação (leitura em audiência, intimação pessoal ou publicação). Art. 998: desistência do recurso sem necessidade de anuência do recorrido. Art. 1.001: irrecorribilidade dos despachos.", caqui:"Regra do prazo recursal: conta de quando a parte SOUBE oficialmente da decisão. Se a sentença foi lida em audiência com as partes presentes, conta de lá. Se foi intimada depois, conta da intimação. Se é acórdão, conta da publicação no órgão oficial. Em dia de prova: o prazo nasce da ciência, não da prolação. E desistência do recurso = ato unilateral do recorrente, sem pedir licença para ninguém."},
  {num:24, exame:"2º Exame OAB-SP — 2008 (CESPE)", titulo:"Requisitos Intrínsecos e Extrínsecos de Admissibilidade Recursal", enunciado:"Não constitui requisito intrínseco de admissibilidade recursal", comando:"Não constitui requisito intrínseco de admissibilidade recursal", gabarito:"B", alt:{"A": "o interesse recursal.", "B": "a regularidade formal.", "C": "a inexistência de fato impeditivo ou extintivo.", "D": "a legitimidade."}, fb:{"A": "Incorreta como resposta. Interesse recursal É requisito intrínseco — a parte deve demonstrar que tem utilidade e necessidade no recurso (sofreu sucumbência ou tem interesse jurídico direto no resultado).", "B": "Correta! Regularidade formal é requisito EXTRÍNSECO de admissibilidade — diz respeito ao modo correto de interpor o recurso (forma, instrumentos, documentos exigidos). Não é requisito intrínseco, que diz respeito ao direito de recorrer em si.", "C": "Incorreta como resposta. Inexistência de fato impeditivo ou extintivo (renúncia, desistência, aceitação da decisão) É requisito intrínseco.", "D": "Incorreta como resposta. Legitimidade É requisito intrínseco — apenas quem tem posição processual adequada pode recorrer."}, fund:"Teoria geral dos recursos — requisitos intrínsecos (ligados ao poder/direito de recorrer): cabimento, legitimidade, interesse recursal, inexistência de fato impeditivo/extintivo. Requisitos extrínsecos (ligados ao modo de exercício): tempestividade, preparo, regularidade formal.", caqui:"A classificação que a FGV ama: INTRÍNSECO = pergunta 'posso recorrer?' = legitimidade, interesse, cabimento, sem fato impeditivo/extintivo. EXTRÍNSECO = pergunta 'recorri do jeito certo?' = tempestividade, preparo, regularidade formal. A regularidade formal (forma da petição, documentos obrigatórios) diz respeito ao COMO, não ao SE. Por isso é extrínseco."},
];
let cur=0,N=QUESTOES.length;
const E=Array(N).fill(null);
function init(){
  const nw=document.getElementById('nw'),ct=document.getElementById('ct');
  QUESTOES.forEach((q,i)=>{
    const b=document.createElement('button');
    b.className='nb'+(i===0?' active':'');b.textContent=i+1;b.onclick=()=>go(i);b.id='n'+i;nw.appendChild(b);
    const d=document.createElement('div');d.className='qc'+(i===0?' vis':'');d.id='c'+i;d.innerHTML=bc(q,i);ct.appendChild(d);
  });upd();us();
}
function bc(q,i){
  const al=Object.entries(q.alt).map(([l,t])=>`<button class="ab" onclick="resp(${i},'${l}',this)" data-l="${l}"><span class="all">${l}</span><span class="alt">${t}</span></button>`).join('');
  return `<div class="qh"><span class="qn">Questão ${q.num}</span>${q.exame?`<span class="qe">${q.exame}</span>`:''}</div><h2 class="qt">${q.titulo}</h2><div class="en">${q.enunciado}</div><p class="co">${q.comando}</p><div class="al" id="a${i}">${al}</div><div class="fb" id="f${i}"></div><div class="fu" id="u${i}"><h4>📖 Fundamento legal</h4>${q.fund}</div><div class="cx" id="x${i}"><h4>🍊 Explicação didática do Professor Caqui</h4>${q.caqui}</div><div class="ca"><div class="bg"><button class="btn az" id="bu${i}" onclick="tF(${i})">Ver fundamento legal</button><button class="btn cq" id="bx${i}" onclick="tX(${i})">Explicação do Prof. Caqui</button><button class="btn" id="br${i}" onclick="rst(${i})">↺ Tentar novamente</button></div><span class="st" id="s${i}"></span></div>`;
}
function resp(i,l,btn){
  if(E[i]!==null)return;E[i]=l;const q=QUESTOES[i];
  document.querySelectorAll(`#a${i} .ab`).forEach(b=>{b.disabled=true;if(b.dataset.l===q.gabarito)b.classList.add('cor');if(b.dataset.l===l&&l!==q.gabarito)b.classList.add('err');});
  const ok=l===q.gabarito,f=document.getElementById('f'+i);
  f.className='fb sh '+(ok?'ac':'er');f.innerHTML=`<strong>${ok?'✓ Correta!':'✗ Incorreta.'}</strong> ${q.fb[l]}`;
  document.getElementById('s'+i).textContent=ok?'Acerto!':'Gabarito: '+q.gabarito;
  document.getElementById('br'+i).className='btn sh';document.getElementById('bu'+i).className='btn az sh';document.getElementById('bx'+i).className='btn cq sh';
  const nb=document.getElementById('n'+i);nb.classList.remove('active');nb.classList.add(ok?'ok':'no');if(i===cur)nb.classList.add('active');us();
}
function tF(i){const b=document.getElementById('u'+i),t=document.getElementById('bu'+i),v=b.classList.contains('sh');b.className=v?'fu':'fu sh';t.textContent=v?'Ver fundamento legal':'Ocultar fundamento';}
function tX(i){const b=document.getElementById('x'+i),t=document.getElementById('bx'+i),v=b.classList.contains('sh');b.className=v?'cx':'cx sh';t.textContent=v?'Explicação do Prof. Caqui':'Ocultar explicação';}
function rst(i){
  E[i]=null;document.querySelectorAll(`#a${i} .ab`).forEach(b=>{b.disabled=false;b.className='ab';});
  document.getElementById('f'+i).className='fb';document.getElementById('u'+i).className='fu';
  document.getElementById('bu'+i).className='btn az';document.getElementById('bu'+i).textContent='Ver fundamento legal';
  document.getElementById('x'+i).className='cx';document.getElementById('bx'+i).className='btn cq';document.getElementById('bx'+i).textContent='Explicação do Prof. Caqui';
  document.getElementById('br'+i).className='btn';document.getElementById('s'+i).textContent='';
  document.getElementById('n'+i).className='nb'+(i===cur?' active':'');us();
}
function go(i){document.getElementById('c'+cur).classList.remove('vis');document.getElementById('n'+cur).classList.remove('active');cur=i;document.getElementById('c'+cur).classList.add('vis');document.getElementById('n'+cur).classList.add('active');upd();window.scrollTo({top:0,behavior:'smooth'});}
function nav(d){const n=cur+d;if(n>=0&&n<N)go(n);}
function upd(){document.getElementById('pi').textContent=(cur+1)+' de '+N;document.getElementById('bp').disabled=cur===0;document.getElementById('bn').disabled=cur===N-1;}
function us(){const r=E.filter(e=>e!==null).length,a=E.filter((e,i)=>e===QUESTOES[i].gabarito).length;document.getElementById('sc-t').textContent=r;document.getElementById('sc-a').textContent=a;document.getElementById('sc-e').textContent=r-a;const p=Math.round((r/N)*100);document.getElementById('pf').style.width=p+'%';document.getElementById('pl').textContent=r+' de '+N+' respondidas';}
init();
</script>
</body>
</html>
